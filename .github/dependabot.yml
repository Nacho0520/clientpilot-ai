version: 2
updates:
  # pnpm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      # Group all @types/* into a single PR
      types:
        patterns:
          - "@types/*"
      # Group Radix UI components together
      radix-ui:
        patterns:
          - "@radix-ui/*"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
